front:
  text: 無量義經序蕭齊荊州隱士劉虬作無量義經者取其無相一灋廣生眾教含義不貲故曰無量夫三界群生隨業而轉一極正覺任機而通流轉起滅者必在苦而希樂此叩聖之感也順通示現者亦施悲而用慈即救世之應也根異教殊其階成七先為波利等說五戒所謂人天善根一也次為拘隣等轉四諦所謂授聲聞乘二也次為中根演十二因緣所謂授緣覺乘三也次為上根舉六波羅蜜所謂授以大乘四也眾教宣融群疑須導次說無量義經既稱得道差品復云未顯真實使發求實之冥機用開一極之由緒五也故法華接唱顯一除三順彼求實之心去此施權之名六也雖權開而實現猶掩常住之正義在雙樹而臨崖乃暢我淨之玄音七也過此以往法門雖多撮其大歸數盡於此亦由眾聲不出五音之表百氏竝在六家之內其無量義經雖法華首戴其目而中夏未覩其說每臨講肆未嘗不廢談而歎想見斯文忽有武當山比丘慧表生自羌胄偽帝姚略從子國破之日為晉軍何澹之所得數歲聰黠澹之字曰螟蛉養為假子俄放出家便勤苦求道南北遊尋不擇夷險以齊建元三年復訪奇搜祕遠至嶺南於廣州朝廷寺遇中天竺沙門曇摩伽陀耶舍手能隸書口解齊言欲傳此經未知所授表便殷勤致請心形俱至淹歷旬朔僅得一本仍還嶠北齎入武當以今永明三年九月十八日頂戴出山見校弘通奉覿真文欣敬兼誠詠歌不足手舞莫宣輒虔訪宿解抽刷庸思謹立序注云自極教應世與俗而差神道救物稱感成異玄圃已東號曰太一罽賓以西字為正學東國明殃慶於百年西域辯休咎於三世希無之與修空其揆一也有欲於無者既無得無之分施心於空者豈有入空之照而講求釋教者或謂會理可漸或謂入空必頓請試言之以筌幽寄立漸者以萬事之成莫不有漸堅氷基於履霜九仞成於累土學人之入空也雖未圓符譬如斬木去寸無寸去尺無尺三空稍登寧非漸耶立頓者以希善之功莫過觀法性法性從緣非有非無忘慮於非有非無理照斯一者乃曰解空存心於非有非無境智猶二者未免於有有中伏結非無日損之驗空上論心未有入理之効而言納羅漢於一聽判無生於終朝是接誘之言非稱實之說妙得非漸理固必然既二談分路兩意爭途一去一取莫之或正尋得旨之匠起自支安支公之論無生以七住為道慧陰足十住則群方與能在迹斯異語照則一安公之辯異觀三乘者始簣之日稱定慧者終成之實錄此謂始求可隨根而三入解則其慧不二譬喻亦云大難既夷乃無有三險路既息其化即亡此則名一為三非有三悟明矣生公云道品可以泥洹非羅漢之名六度可以至佛非樹王之謂斬木之喻木存故尺寸可漸無生之證生盡故其照必頓案三乘名教皆以生盡照息去有入空以此為道不得取像於形器也今無量義亦以無相為本若所證實異豈曰無相若入照必同寧曰有漸非漸而云漸密筌之虛教耳如來亦云空拳誑小兒以此度眾生微文接麁漸說或允忘象得意頓義為長聊舉大較談者擇焉
